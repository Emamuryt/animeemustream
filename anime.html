<!DOCTYPE html>
<html>
<head>
  <title>AnimeEmu - Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Anime Details</h1>

<div id="animeDetails"></div>

<script src="api.js"></script>
<script>
async function loadDetails() {
  const id = localStorage.getItem("animeId");

  const data = await getAnimeSeries(id);

  const anime = data.anime;

  document.getElementById("animeDetails").innerHTML = `
    <h2>${anime.title}</h2>
    <img src="${anime.image}" />

    <h3>Episodes</h3>
    <div class="episodes">
      ${data.episodes.map(ep => `
        <button onclick="watch('${ep.embed_url.sub}')">
          EP ${ep.number}
        </button>
      `).join("")}
    </div>
  `;
}

function watch(url) {
  localStorage.setItem("videoUrl", url);
  window.location.href = "watch.html";
}

loadDetails();
</script>

</body>
</html>
